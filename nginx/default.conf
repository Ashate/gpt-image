upstream backend {
    server backend:3001;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Health check
    location /api/health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # API — proxy to Node.js backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # Allow time for image generation
    }

    # Uploads — static images served from backend container
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Everything else — React SPA (frontend container)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }
}
